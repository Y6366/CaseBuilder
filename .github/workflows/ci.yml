name: CI Pipeline

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  # ========== 门禁检查 ==========
  gate:
    name: 🔒 Quality Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # 门禁1：语法检查 - 源码Python文件必须可解析（排除模板文件）
      - name: Syntax check (compile all)
        run: |
          errors=0
          for f in $(find . -name '*.py' -not -path './__pycache__/*' -not -path '*/__pycache__/*' -not -path './knowledge/templates/*'); do
            if ! python3 -m py_compile "$f" 2>/dev/null; then
              echo "❌ Syntax error: $f"
              python3 -m py_compile "$f"
              errors=$((errors + 1))
            fi
          done
          if [ $errors -gt 0 ]; then
            echo "::error::$errors file(s) have syntax errors"
            exit 1
          fi
          echo "✅ All Python files pass syntax check"

      # 门禁2：模板文件验证（确保占位符格式正确）
      - name: Template check
        run: |
          for f in knowledge/templates/*.py; do
            if [ -f "$f" ]; then
              # 模板文件应包含 {class_name} 等占位符，不是合法Python
              if grep -q '{class_name}' "$f"; then
                echo "✅ Template: $f (placeholders found)"
              else
                echo "⚠️ Template: $f (no placeholders, might be broken)"
              fi
            fi
          done

      # 门禁3：导入检查 - 所有模块可正常导入
      - name: Import check
        run: |
          python3 -c "
          import sys, importlib
          modules = [
              'agents.intent_agent',
              'agents.retrieval_agent',
              'agents.codegen_agent',
              'agents.review_agent',
              'tools.build_context',
              'workflow.orchestrator',
          ]
          failed = []
          for m in modules:
              try:
                  importlib.import_module(m)
                  print(f'✅ {m}')
              except Exception as e:
                  print(f'❌ {m}: {e}')
                  failed.append(m)
          if failed:
              print(f'\n::error::{len(failed)} module(s) failed to import')
              sys.exit(1)
          print(f'\n✅ All {len(modules)} modules imported successfully')
          "

  # ========== 代码风格检查 ==========
  lint:
    name: 🔍 Lint
    runs-on: ubuntu-latest
    needs: gate
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install linters
        run: pip install ruff

      - name: Ruff check
        run: |
          ruff check . --output-format=github --exclude "knowledge/templates"

      - name: Ruff format check
        run: |
          ruff format --check .

  # ========== 单元测试 ==========
  test:
    name: 🧪 Tests
    runs-on: ubuntu-latest
    needs: gate
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run tests
        run: |
          if [ -d "tests" ]; then
            pip install pytest pytest-cov
            pytest tests/ -v --tb=short
          else
            python3 scripts/validate.py
          fi

  # ========== 安全检查 ==========
  security:
    name: 🛡️ Security
    runs-on: ubuntu-latest
    needs: gate
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install bandit
        run: pip install bandit

      - name: Security scan
        run: |
          bandit -r . -x './tests,./.git,./knowledge/templates' -f json -o bandit-report.json || true
          bandit -r . -x './tests,./.git,./knowledge/templates' -ll || true
          echo "Security scan completed"

      - name: Check for secrets
        run: |
          # 简单检查：是否有硬编码的API key/密码
          secrets_found=0
          for pattern in "api_key\s*=" "password\s*=" "secret\s*=" "token\s*="; do
            matches=$(grep -rn --include="*.py" --include="*.yaml" --include="*.json" -i "$pattern" . 2>/dev/null | grep -v "test" | grep -v ".git" | grep -v "settings.yaml" || true)
            if [ -n "$matches" ]; then
              echo "⚠️ Potential secret found:"
              echo "$matches"
              secrets_found=$((secrets_found + 1))
            fi
          done
          if [ $secrets_found -gt 0 ]; then
            echo "::warning::$secrets_found potential secret(s) detected"
          else
            echo "✅ No hardcoded secrets detected"
          fi

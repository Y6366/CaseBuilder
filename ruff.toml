# Ruff 配置 - Python代码风格
# https://docs.astral.sh/ruff/

# 目标Python版本
target-version = "py39"

# 每行最大字符数
line-length = 120

# 排除目录
exclude = [
    "__pycache__",
    ".git",
    "output",
    "logs",
    "context_output",
    "knowledge/templates",
]

[lint]
# 启用的规则集
select = [
    "E",    # pycodestyle errors
    "W",    # pycodestyle warnings
    "F",    # pyflakes
    "I",    # isort (import排序)
    "N",    # pep8-naming
    "UP",   # pyupgrade
    "B",    # flake8-bugbear
    "SIM",  # flake8-simplify
]

# 忽略的规则
ignore = [
    "E501",   # 行长度由format处理
    "N806",   # 允许非lowercase变量名(如TestCase)
    "E402",   # sys.path.insert后的module import是合理的
]

[lint.isort]
known-first-party = ["agents", "tools", "workflow", "knowledge"]

[format]
quote-style = "double"
indent-style = "space"

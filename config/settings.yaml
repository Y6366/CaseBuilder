# CaseBuilder 配置文件
project:
  name: "CaseBuilder"
  version: "1.0.0"
  description: "基于多Agent协作的测试用例自动生成系统"

# LLM 配置
llm:
  # 意图识别Agent使用的模型
  intent_model: "zai/glm-5.1"
  # 代码生成Agent使用的模型
  code_model: "zai/glm-5.1"
  # 质量校验Agent使用的模型
  review_model: "zai/glm-5.1"
  # 温度参数
  temperature: 0.1
  # 最大token
  max_tokens: 8192

# 工程路径配置
paths:
  # 测试工程根目录（需要指向实际测试工程）
  test_project_root: ""
  # 多层上下文构建输出目录
  context_output_dir: "context_output"
  # 生成的用例输出目录
  output_dir: "output"
  # 日志目录
  log_dir: "logs"

# 知识库配置
knowledge:
  # 公共方法词典路径
  method_glossary: "knowledge/method_glossary.json"
  # 模板库路径
  templates_dir: "knowledge/templates"
  # 规则库路径
  rules_dir: "knowledge/rules"

# 流程控制
workflow:
  # 是否启用人工检查点（true时在每个阶段暂停等待确认）
  enable_human_checkpoint: true
  # 是否启用质量校验
  enable_review: true
  # 质量校验不通过时最大重试次数
  max_review_retries: 2
  # 是否保留中间产物
  keep_artifacts: true

# 日志配置
logging:
  level: "INFO"
  format: "%(asctime)s [%(levelname)s] %(name)s: %(message)s"
  file_enabled: true
